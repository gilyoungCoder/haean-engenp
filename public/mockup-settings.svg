  <text x="400" y="849" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="13" font-weight="600">로그아웃</text>

  <text x="400" y="888" text-anchor="middle" fill="#c0b8d8" font-family="system-ui" font-size="10">데스크톱/모바일 동일한 풀페이지 — ← 돌아가기로 대시보드 복귀</text>
